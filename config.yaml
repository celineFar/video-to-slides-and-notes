# ─────────────────────────────────────────────
# main.py configuration
# Run: python3 main.py --config config.yaml
# ─────────────────────────────────────────────

# URL or absolute/relative path to a local video file (required).
# Set to a YouTube URL to download the video automatically.
video_path: "uploads/docker-video-5-minutes.mp4"

# Directory where downloaded YouTube videos are saved
video_dir: "videos"

# Label used for output folders: processed_videos/{video_title}/
video_title: "Docker-Tutorial"

# HH:MM:SS timestamps where the video is split into chunks.
# Leave empty (or remove the key) to process the whole video as one chunk.
# split_timestamps:
#   - "00:05:0"
#   - "00:17:45"
#   - "00:40:33"

# Path to a pre-saved transcript pickle (.pkl). Required for local video files.
# For YouTube URLs, leave as null to fetch the transcript automatically.
transcript_path: "uploads/docker_transcript_9seconds.pkl"

# Language preference order for auto-fetched YouTube transcripts.
# The first available language in the list will be used.
transcript_languages:
  - "en"
  - "zh-Hant"
  - "zh-Hans"
  - "ja"

# Seconds between captured screenshots
screenshot_interval: 4.5

# Seconds per transcript chunk
transcript_interval: 9

# Maximum download resolution (e.g. 720, 1080). null = best available.
max_resolution: null

# Root folder for screenshot output
screenshots_dir: "screenshots"

# YouTube URL for the video (only needed when video_path is a local file).
# If video_path is already a YouTube URL, this field is ignored.
# Each slide will include a clickable footnote link that jumps to the exact
# timestamp of that slide in the video.
youtube_url: "https://www.youtube.com/watch?v=pTFZFxd4hOI&t=2442s&pp=ugUEEgJlbg%3D%3D"

# Print detailed progress logs
verbose: false
